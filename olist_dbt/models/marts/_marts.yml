version: 2

models:
  - name: mart_daily_revenue
    description: >
      Daily revenue time series with a date spine for gap-filling.
      One row per calendar day across the full dataset range (2016–2018).
    columns:
      - name: revenue_date
        description: Calendar date (grain key)
        tests:
          - unique
          - not_null
      - name: total_orders
        description: Number of delivered orders on that day
        tests:
          - not_null
      - name: total_revenue
        description: Total revenue in BRL (price + freight)
        tests:
          - not_null
      - name: revenue_month
        description: Truncated month (YYYY-MM-01) for monthly rollups
        tests:
          - not_null

  - name: mart_customer_rfm
    description: >
      RFM (Recency-Frequency-Monetary) segmentation for all customers
      with at least one delivered order, scored via NTILE(5) quintiles.
    columns:
      - name: customer_unique_id
        description: Unique customer identifier (grain key)
        tests:
          - unique
          - not_null
      - name: rfm_segment
        description: Customer segment label derived from RFM scores
        tests:
          - not_null
          - accepted_values:
              values:
                - Champions
                - Loyal Customers
                - New Customers
                - At Risk
                - Big Spenders Lost
                - Lost
                - Potential
      - name: monetary
        description: Total spend in BRL
        tests:
          - not_null
      - name: frequency
        description: Number of delivered orders
        tests:
          - not_null

  - name: mart_delivery_analysis
    description: >
      Delivery performance aggregated by bucket (≤7d, 8-14d, 15-21d, 22-30d, >30d)
      and late-delivery flag. Used to surface satisfaction impact of delays.
    columns:
      - name: delivery_bucket
        description: Ordered delivery-time bucket label
        tests:
          - not_null
      - name: is_late_delivery
        description: Whether estimated delivery was exceeded
        tests:
          - not_null
      - name: nb_orders
        description: Number of delivered orders in this bucket
        tests:
          - not_null
      - name: avg_review_score
        description: Average customer satisfaction score (1–5)
        tests:
          - not_null

  - name: mart_product_analytics
    description: >
      Product-level revenue, volume, and satisfaction metrics.
      Filtered to delivered orders only; one row per product_id.
    columns:
      - name: product_id
        description: Product identifier (grain key)
        tests:
          - unique
          - not_null
      - name: total_revenue
        description: Total revenue generated by this product in BRL
        tests:
          - not_null
      - name: nb_orders
        description: Number of distinct orders containing this product
        tests:
          - not_null

  - name: mart_seller_performance
    description: >
      Seller-level performance summary: volume, delivery speed, satisfaction.
      Includes a tiering label (Top Performer / Solid / Needs Improvement / Low Volume).
    columns:
      - name: seller_id
        description: Seller identifier (grain key)
        tests:
          - unique
          - not_null
      - name: seller_tier
        description: Performance tier based on order volume and review score
        tests:
          - not_null
          - accepted_values:
              values:
                - Top Performer
                - Solid
                - Needs Improvement
                - Low Volume
      - name: total_orders
        description: Number of distinct orders fulfilled by this seller
        tests:
          - not_null
      - name: avg_review_score
        description: Average customer satisfaction score (1–5)
        tests:
          - not_null

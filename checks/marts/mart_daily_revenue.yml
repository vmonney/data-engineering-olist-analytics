checks for mart_daily_revenue:
  - row_count between 700 and 800:
      name: "~730 jours de donnees (2 ans)"
  - missing_count(revenue_date) = 0:
      name: "Toutes les lignes ont une date"
  - min(gross_revenue) > 0:
      name: "Pas de journee avec revenu brut nul"
  - avg(avg_order_value) between 100 and 200:
      name: "Panier moyen plausible (BRL)"
